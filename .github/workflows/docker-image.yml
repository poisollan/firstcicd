name: Build Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t mohan-flask-app .

      - name: Tag Docker Image
        run: |
          docker tag mohan-flask-app:latest 845875661014.dkr.ecr.us-east-1.amazonaws.com/mohan-flask-app:${{ github.sha }}

      - name: Push Image to ECR
        run: |
          docker push 845875661014.dkr.ecr.us-east-1.amazonaws.com/mohan-flask-app:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull 845875661014.dkr.ecr.us-east-1.amazonaws.com/mohan-flask-app:${{ github.sha }}
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d -p 80:5000 --name flask-app 845875661014.dkr.ecr.us-east-1.amazonaws.com/mohan-flask-app:${{ github.sha }}
       
