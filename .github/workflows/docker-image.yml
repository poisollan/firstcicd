name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1   # change if your region is different

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        run: |
          IMAGE_URI=845875661014.dkr.ecr.us-east-1.amazonaws.com/mohan-flask-app
          docker build -t 845875661014.dkr.ecr.us-east-1.amazonaws.com/mohan-flask-app:${{ github.sha }} .
          docker push 845875661014.dkr.ecr.us-east-1.amazonaws.com/mohan-flask-app:${{ github.sha }}
